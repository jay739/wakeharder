name: Release

# Push a semver tag to publish an APK:
#   git tag v0.1.0 && git push origin v0.1.0
# Can also be run manually from the Actions tab (workflow_dispatch),
# which builds the APK as a run artifact without creating a release.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Unit tests
        run: ./gradlew test --console=plain
      - name: Build debug-signed APK
        run: ./gradlew assembleDebug --console=plain
      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk wakeharder-${{ github.ref_name }}-debug.apk
      - name: Upload run artifact
        uses: actions/upload-artifact@v4
        with:
          name: wakeharder-apk
          path: wakeharder-*.apk
      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: wakeharder-*.apk
          generate_release_notes: true
          body: |
            Debug-signed APK (sideload via "install unknown apps").
            A proper release keystore is planned; until then this build is
            suitable for testing, not for app stores.
